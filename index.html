<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대화 가이드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #F0EFE9;
  --border: #E4E2DB;
  --text: #1C1B18;
  --text2: #6B6960;
  --text3: #A09D95;
  --accent: #2D6A4F;
  --accent-light: #D8EDE4;
  --accent-text: #1B4332;
  --blue: #2563EB;
  --blue-light: #DBEAFE;
  --blue-text: #1E3A8A;
  --amber: #D97706;
  --amber-light: #FEF3C7;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 9px;
}
[data-theme="dark"] {
  --bg: #111110;
  --surface: #1C1C1A;
  --surface2: #252522;
  --border: #333330;
  --text: #F0EFE9;
  --text2: #A09D95;
  --text3: #6B6960;
  --accent: #4ADE80;
  --accent-light: #14532D;
  --accent-text: #86EFAC;
  --blue: #60A5FA;
  --blue-light: #1E3A5F;
  --blue-text: #93C5FD;
  --amber: #FCD34D;
  --amber-light: #451A03;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}
/* Layout */
.app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }
/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
.topbar-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 18px; transition: background .15s;
}
.icon-btn:hover { background: var(--surface2); }
/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 100;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  max-width: 480px;
  width: 100%;
}
.nav-btn {
  flex: 1; border: none; background: transparent; cursor: pointer;
  padding: 10px 8px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text3); font-size: 10px; font-weight: 600;
  transition: color .15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn i { font-size: 20px; }
/* Pages */
.page { display: none; padding: 16px; }
.page.active { display: block; }
/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-body { padding: 16px; }
/* Step bar */
.step-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .2s; }
.sdot.on { background: var(--accent); }
.sdot.done { background: var(--text3); }
.step-lbl { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
/* Breadcrumb */
.bc { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 10px; font-size: 11px; color: var(--text3); }
.bc span { color: var(--text2); }
/* Section headings */
.sec-h { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.sec-s { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
/* Option buttons */
.opt-grid { display: grid; gap: 10px; margin-bottom: 14px; }
.opt-grid.g2 { grid-template-columns: 1fr 1fr; }
.opt-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
@media(max-width:360px) { .opt-grid.g3 { grid-template-columns: 1fr 1fr; } }
.opt-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  display: flex; flex-direction: column; gap: 3px;
  width: 100%; -webkit-appearance: none;
}
.opt-btn:active { transform: scale(.97); }
.opt-btn .oico { font-size: 22px; color: var(--text2); margin-bottom: 3px; }
.opt-btn .olbl { font-size: 14px; font-weight: 700; color: var(--text); }
.opt-btn .osub { font-size: 11px; color: var(--text3); }
/* Back button */
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 13px;
  font-size: 12px; color: var(--text2); cursor: pointer;
  margin-bottom: 14px; transition: all .15s;
}
.back-btn:active { background: var(--surface2); }
/* Result card */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--accent-light); color: var(--accent-text);
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 99px; margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: .4px;
}
.opener-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  padding: 12px 14px 44px;
  margin-bottom: 6px;
  position: relative;
}
.opener-txt { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.55; }
.copy-btn {
  position: absolute; bottom: 10px; right: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 4px 8px;
  font-size: 11px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; gap: 3px;
  transition: all .15s;
}
.copy-btn:active { background: var(--accent-light); color: var(--accent-text); }
.note-txt { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
/* Expand button */
.expand-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 14px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--text2);
  transition: all .15s; text-align: left;
}
.expand-btn:active { background: var(--border); }
/* Conversation */
.convo { padding-top: 12px; }
.convo-hd { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.msgs { display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.role { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; flex-shrink: 0; margin-top: 2px; }
.role.we { background: var(--accent-light); color: var(--accent-text); }
.role.them { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.msg-txt { font-size: 13px; color: var(--text); line-height: 1.6; }
/* Tip */
.tip-box {
  background: var(--amber-light);
  border-radius: var(--radius-sm);
  padding: 10px 13px; margin-top: 12px;
  display: flex; gap: 8px; align-items: flex-start;
  font-size: 12px; color: var(--amber);
}
/* Chips */
.chips-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
.chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 12px;
  font-size: 12px; color: var(--text2); cursor: pointer;
  transition: all .15s;
}
.chip:active { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
/* Favorites page */
.fav-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.fav-empty i { font-size: 44px; margin-bottom: 12px; display: block; }
.fav-empty p { font-size: 14px; line-height: 1.6; }
.fav-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
  transition: all .15s;
}
.fav-item:active { background: var(--surface2); }
.fav-info { flex: 1; min-width: 0; }
.fav-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
.fav-tag { font-size: 10px; font-weight: 700; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 99px; }
.fav-opener { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.45; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fav-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px; flex-shrink: 0; }
/* Recent page */
.rec-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 13px 15px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: all .15s;
}
.rec-item:active { background: var(--surface2); }
.rec-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text2); flex-shrink: 0; }
.rec-info { flex: 1; min-width: 0; }
.rec-path { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.rec-opener { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
/* Notes page */
.note-form { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; }
.note-form textarea {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
  font-size: 13px; padding: 10px 12px; resize: none;
  font-family: inherit; outline: none; line-height: 1.6;
  transition: border-color .15s;
}
.note-form textarea:focus { border-color: var(--accent); }
.note-form-row { display: flex; gap: 8px; margin-top: 10px; }
.note-form select {
  flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
  font-size: 12px; padding: 8px 10px; outline: none; font-family: inherit;
}
.submit-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  padding: 8px 16px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.submit-btn:active { opacity: .8; }
.note-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 15px; margin-bottom: 8px;
}
.note-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.note-cat { font-size: 10px; font-weight: 700; background: var(--accent-light); color: var(--accent-text); padding: 2px 9px; border-radius: 99px; }
.note-date { font-size: 10px; color: var(--text3); }
.note-body { font-size: 13px; color: var(--text); line-height: 1.6; }
.note-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; }
/* Search overlay */
.search-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg); overflow-y: auto;
  display: none;
}
.search-overlay.show { display: block; }
.search-top {
  position: sticky; top: 0; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; gap: 10px; align-items: center;
}
.search-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface2); color: var(--text);
  font-size: 14px; padding: 9px 16px; outline: none; font-family: inherit;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-cancel { background: transparent; border: none; color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.search-results { padding: 12px 16px; }
.search-result-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 13px 15px; margin-bottom: 8px;
  cursor: pointer; transition: background .15s;
}
.search-result-item:active { background: var(--surface2); }
.sri-path { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.sri-opener { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 3px; }
.sri-note { font-size: 12px; color: var(--text2); }
.search-empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: var(--surface);
  padding: 9px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .25s; pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* Section divider */
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-txt { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
/* Star toggle */
.star-btn {
  background: transparent; border: none; cursor: pointer;
  font-size: 20px; color: var(--text3); padding: 4px; line-height: 1;
  transition: color .15s;
}
.star-btn.starred { color: #F59E0B; }
/* Empty state */
.empty-block { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-block i { font-size: 36px; margin-bottom: 10px; display: block; }
.empty-block p { font-size: 13px; line-height: 1.6; }
/* Highlight */
mark { background: var(--accent-light); color: var(--accent-text); border-radius: 3px; padding: 0 2px; }
</style>
</head>
<body data-theme="light">

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">대화 가이드</span>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="openSearch()" title="검색"><i class="ti ti-search"></i></button>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="다크모드"><i class="ti ti-moon"></i></button>
    </div>
  </div>

  <!-- Pages -->
  <div class="page active" id="page-guide">
    <div id="guide-content"></div>
  </div>

  <div class="page" id="page-fav">
    <div id="fav-content"></div>
  </div>

  <div class="page" id="page-recent">
    <div id="recent-content"></div>
  </div>

  <div class="page" id="page-notes">
    <div id="notes-content"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-guide" onclick="showPage('guide')">
      <i class="ti ti-compass"></i>가이드
    </button>
    <button class="nav-btn" id="nav-fav" onclick="showPage('fav')">
      <i class="ti ti-star"></i>즐겨찾기
    </button>
    <button class="nav-btn" id="nav-recent" onclick="showPage('recent')">
      <i class="ti ti-history"></i>최근 기록
    </button>
    <button class="nav-btn" id="nav-notes" onclick="showPage('notes')">
      <i class="ti ti-pencil"></i>나의 경험
    </button>
  </nav>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-top">
    <input class="search-input" id="search-input" type="text" placeholder="상황, 키워드로 검색..." oninput="doSearch(this.value)" autocomplete="off">
    <button class="search-cancel" onclick="closeSearch()">취소</button>
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const D = {
  male:{label:"남성",ages:{
    youth:{label:"10~20대",sub:"청년·학생",situations:{
      commute:{label:"하교·통학 중",opener:"학교 끝나셨나 봐요? 지금 참 좋은 나이시네요!",note:"상황에 맞는 질문 + 칭찬으로 시작",convo:[
        {r:"we",t:"학교 끝나셨나 봐요? 지금 참 좋은 나이시네요."},
        {r:"them",t:"네, 막 수업 끝났어요."},
        {r:"we",t:"혹시 예수님에 대해 들어보셨어요? 예수께서 이 땅에 오셔서 돌아가신 이유가 있는데, 궁금하지 않으세요?"},
        {r:"them",t:"궁금하긴 한데 자세히는 모르겠어요."},
        {r:"we",t:"이 QR코드로 간단히 확인해 보실 수 있어요. 나중에 더 이야기 나눌 수 있으면 좋겠네요!"},
      ],tip:"이동 중인 상황이면 무리하게 길게 끌지 말고 QR카드나 연락처 교환으로 연결하세요."},
      exam:{label:"취업·시험 스트레스",opener:"시험 기간이라 고생이 많겠네요. 사람의 뇌가 엄청난 정보를 저장할 수 있다는데, 점수 몇 번으로 가치를 평가받는 게 좀 안타깝죠?",note:"공감 → 인간의 가치로 연결",convo:[
        {r:"we",t:"시험 기간이라 힘들겠네요. 수고가 많아요."},
        {r:"them",t:"네, 너무 바빠요."},
        {r:"we",t:"사람의 뇌가 엄청난 정보를 저장할 수 있다는데, 시험 점수 몇 번으로 평가받는 게 조금 안타깝지 않으세요?"},
        {r:"them",t:"맞아요, 그런 생각 든 적 있어요."},
        {r:"we",t:"사람이 능력을 온전히 발휘할 수 있다면 어떤 세상일까, 성경에서 힌트를 얻고 있어요. 시험 잘 보세요!"},
      ],tip:"결론보다 질문으로 끝내면 상대방이 스스로 생각하게 돼요."},
      interest:{label:"소지품·취미 계기",opener:"가방에 달린 인형 너무 귀엽네요! 어디서 사셨어요?",note:"관찰 → 소지품·관심사로 대화 시작",convo:[
        {r:"we",t:"가방 인형 너무 귀엽네요!"},
        {r:"them",t:"감사해요 하하."},
        {r:"we",t:"혹시 학생이세요? 전공이 뭐예요?"},
        {r:"them",t:"한경대 다니고 있어요."},
        {r:"we",t:"jw.org에 학교생활·친구 관계에 도움이 되는 무료 자료가 많아요. 한번 들어가 보실래요?"},
      ],tip:"소지품 → 학생 신분 확인 → 실용적 자료 소개 순서로 거부감을 줄여요."},
      war:{label:"전쟁·사회 문제 관심",opener:"전쟁이 없어질 때가 올까요? 역사를 보면 어느 순간부터 전쟁이 더 많아졌다는 점이 신기하지 않으세요?",note:"사회 이슈 → 성경 예언으로 연결",convo:[
        {r:"we",t:"전쟁이 없어질 때가 올까요?"},
        {r:"them",t:"역사적으로 계속 있어왔으니 없어지기 어렵겠죠."},

      religion:{label:"다른 종교 믿는 분",opener:"하느님이 계신다고 생각하세요? 하느님께도 이름이 있는데, 바로 '여호와'예요.",note:"종교 유무 묻지 않고 '하나님의 이름'으로 접근",convo:[
        {r:"we",t:"하느님이 계신다고 생각하세요?"},
        {r:"them",t:"불교 신자인데요..."},
        {r:"we",t:"관심이 없으시면 그럴 수 있어요. 그런데 하느님께도 이름이 있다는 거 아세요? 바로 '여호와'예요."},
        {r:"them",t:"(웃으시거나 신기해하심)"},
        {r:"we",t:"저희 전시대에 들르시면 더 이야기 나눌 수 있어요. 또 뵙겠습니다!"},
      ],tip:"'하느님의 이름'은 가볍고 흥미롭게 전할 수 있는 좋은 포인트예요."},
      errand:{label:"장보기·심부름 후",opener:"짐이 많으시네요, 어디 다녀오셨어요?",note:"실생활 이야기로 시작 → 공감 → 자연스럽게 소개",convo:[
        {r:"we",t:"짐이 많으시네요! 어디 다녀오셨어요?"},
        {r:"them",t:"과일이랑 버섯 좀 샀는데 요즘 물가가..."},
        {r:"we",t:"맞아요, 요즘 고물가에 싼 곳 있으면 귀가 번쩍 뜨이죠. 저희는 저기 전시대에서 봉사하는 사람들이에요, 보신 적 있으세요?"},
        {r:"them",t:"아, 여호와의 증인이죠?"},
        {r:"we",t:"맞아요! 요즘 도움이 될 내용들이 많으니 한번 들러보세요!"},
      ],tip:"물가·생활 이야기는 나이 불문 공감대를 형성하기 좋아요."},
      grief:{label:"사별·외로움",opener:"오랫동안 함께 사신 분이 돌아가셨군요. 그리운 마음이 많이 드시겠어요.",note:"깊은 공감 → 부활 희망으로 연결",convo:[
        {r:"we",t:"남편분이 돌아가신 지 얼마나 됐어요?"},
        {r:"them",t:"올해 초에 돌아가셨어요..."},
        {r:"we",t:"정말 많이 힘드시겠어요. 다시 만날 수 있다는 희망이 있다면 어떻겠어요?"},
        {r:"them",t:"그게 가능한가요?"},
        {r:"we",t:"성경에 부활에 대한 희망이 있어요. 제가 보여드려도 될까요?"},
      ],tip:"사별한 분께 진심으로 공감해드릴 때 부활의 희망이 큰 위로가 돼요."},
    }}
  }}
};
const AGE_ICO = {youth:"ti-school",middle:"ti-briefcase",senior:"ti-armchair"};

// ─── STATE ──────────────────────────────────────────────────────────
let S = {step:0, g:null, a:null, sit:null};
let favs = JSON.parse(localStorage.getItem('favs')||'[]');
let recents = JSON.parse(localStorage.getItem('recents')||'[]');
let notes = JSON.parse(localStorage.getItem('notes')||'[]');
let isDark = localStorage.getItem('theme') === 'dark';

// ─── THEME ──────────────────────────────────────────────────────────
function applyTheme(){
  document.body.dataset.theme = isDark ? 'dark' : 'light';
  document.getElementById('theme-btn').innerHTML = isDark ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
}
applyTheme();

function toggleTheme(){
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
}

// ─── NAVIGATION ─────────────────────────────────────────────────────
let curPage = 'guide';
function showPage(p){
  curPage = p;
  ['guide','fav','recent','notes'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('active', n===p);
    document.getElementById('nav-'+n).classList.toggle('active', n===p);
  });
  const titles = {guide:'대화 가이드', fav:'즐겨찾기', recent:'최근 기록', notes:'나의 경험담'};
  document.getElementById('topbar-title').textContent = titles[p];
  if(p==='fav') renderFav();
  if(p==='recent') renderRecent();
  if(p==='notes') renderNotes();
}

// ─── FAVORITES ──────────────────────────────────────────────────────
function favKey(g,a,s){ return g+'|'+a+'|'+s; }
function isFav(g,a,s){ return favs.includes(favKey(g,a,s)); }
function toggleFav(g,a,s){
  const k = favKey(g,a,s);
  if(favs.includes(k)) favs = favs.filter(x=>x!==k);
  else favs.push(k);
  localStorage.setItem('favs', JSON.stringify(favs));
  renderGuide();
  showToast(favs.includes(k) ? '★ 즐겨찾기에 추가됐어요' : '즐겨찾기에서 제거됐어요');
}
function renderFav(){
  const el = document.getElementById('fav-content');
  if(!favs.length){
    el.innerHTML=`<div class="fav-empty"><i class="ti ti-star"></i><p>아직 즐겨찾기가 없어요.<br>자주 쓰는 상황의 ☆ 을 눌러 추가하세요.</p></div>`;
    return;
  }
  let h='';
  favs.forEach(k=>{
    const [g,a,s] = k.split('|');
    try{
      const sit = D[g].ages[a].situations[s];
      h+=`<div class="fav-item" onclick="goToSit('${g}','${a}','${s}')">
        <div class="fav-info">
          <div class="fav-tags">
            <span class="fav-tag">${D[g].label}</span>
            <span class="fav-tag">${D[g].ages[a].label}</span>
            <span class="fav-tag">${sit.label}</span>
          </div>
          <div class="fav-opener">"${sit.opener}"</div>
        </div>
        <button class="fav-del" onclick="event.stopPropagation();removeFav('${k}')"><i class="ti ti-x"></i></button>
      </div>`;
    }catch(e){}
  });
  el.innerHTML=h;
}
function removeFav(k){
  favs = favs.filter(x=>x!==k);
  localStorage.setItem('favs', JSON.stringify(favs));
  renderFav();
  showToast('즐겨찾기에서 제거됐어요');
}
function goToSit(g,a,s){
  S={step:3,g,a,sit:s};
  showPage('guide');
  addRecent(g,a,s);
  renderGuide();
}

// ─── RECENTS ────────────────────────────────────────────────────────
function addRecent(g,a,s){
  const entry = {g,a,s,t:Date.now()};
  recents = recents.filter(r=>!(r.g===g&&r.a===a&&r.s===s));
  recents.unshift(entry);
  if(recents.length>30) recents=recents.slice(0,30);
  localStorage.setItem('recents', JSON.stringify(recents));
}
function timeAgo(ts){
  const d = Date.now()-ts;
  if(d<60000) return '방금';
  if(d<3600000) return Math.floor(d/60000)+'분 전';
  if(d<86400000) return Math.floor(d/3600000)+'시간 전';
  return Math.floor(d/86400000)+'일 전';
}
function renderRecent(){
  const el = document.getElementById('recent-content');
  if(!recents.length){
    el.innerHTML=`<div class="empty-block"><i class="ti ti-history"></i><p>아직 기록이 없어요.<br>가이드를 조회하면 자동으로 기록돼요.</p></div>`;
    return;
  }
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:13px;color:var(--text2)">최근 조회한 상황</span><button onclick="clearRecents()" style="background:transparent;border:none;font-size:12px;color:var(--text3);cursor:pointer">전체 지우기</button></div>`;
  recents.forEach(r=>{
    try{
      const sit = D[r.g].ages[r.a].situations[r.s];
      h+=`<div class="rec-item" onclick="goToSit('${r.g}','${r.a}','${r.s}')">
        <div class="rec-icon"><i class="ti ti-message-circle"></i></div>
        <div class="rec-info">
          <div class="rec-path">${D[r.g].label} · ${D[r.g].ages[r.a].label} · ${sit.label}</div>
          <div class="rec-opener">"${sit.opener}"</div>
        </div>
        <div class="rec-time">${timeAgo(r.t)}</div>
      </div>`;
    }catch(e){}
  });
  el.innerHTML=h;
}
function clearRecents(){
  recents=[];
  localStorage.setItem('recents', JSON.stringify(recents));
  renderRecent();
  showToast('최근 기록을 지웠어요');
}

// ─── NOTES ──────────────────────────────────────────────────────────
function renderNotes(){
  const el = document.getElementById('notes-content');
  let cats = '';
  Object.entries(D).forEach(([gk,gv])=>{
    Object.entries(gv.ages).forEach(([ak,av])=>{
      Object.entries(av.situations).forEach(([sk,sv])=>{
        cats+=`<option value="${gk}|${ak}|${sk}">${gv.label} · ${av.label} · ${sv.label}</option>`;
      });
    });
  });
  cats = `<option value="">— 상황 선택 (선택사항)</option>`+cats;
  let notesHtml = '';
  if(notes.length){
    notes.forEach((n,i)=>{
      let catLabel='';
      if(n.cat){const[g,a,s]=n.cat.split('|');try{catLabel=`${D[g].label} · ${D[g].ages[a].label} · ${D[g].ages[a].situations[s].label}`;}catch(e){}}
      notesHtml+=`<div class="note-item">
        <div class="note-meta">
          <span class="note-cat">${catLabel||'일반 메모'}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="note-date">${new Date(n.t).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
            <button class="note-del" onclick="deleteNote(${i})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="note-body">${n.body.replace(/\n/g,'<br>')}</div>
      </div>`;
    });
  } else {
    notesHtml=`<div class="empty-block"><i class="ti ti-pencil"></i><p>나의 봉사 경험을 기록해 보세요.<br>좋았던 대화, 배운 점, 아이디어 등을<br>메모로 남길 수 있어요.</p></div>`;
  }
  el.innerHTML=`<div class="note-form">
    <textarea id="note-ta" rows="4" placeholder="오늘 있었던 좋은 대화나 느낀 점을 기록해 보세요..."></textarea>
    <div class="note-form-row">
      <select id="note-cat">${cats}</select>
      <button class="submit-btn" onclick="saveNote()">저장</button>
    </div>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-txt">저장된 경험담</div><div class="divider-line"></div></div>
  ${notesHtml}`;
}
function saveNote(){
  const body = document.getElementById('note-ta').value.trim();
  if(!body){showToast('내용을 입력해 주세요');return;}
  const cat = document.getElementById('note-cat').value;
  notes.unshift({body,cat,t:Date.now()});
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
  showToast('경험담이 저장됐어요 ✓');
}
function deleteNote(i){
  notes.splice(i,1);
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
  showToast('삭제됐어요');
}

// ─── SEARCH ─────────────────────────────────────────────────────────
function openSearch(){
  document.getElementById('search-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
  doSearch('');
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('show');
  document.getElementById('search-input').value='';
}
function doSearch(q){
  const el = document.getElementById('search-results');
  const results = [];
  Object.entries(D).forEach(([gk,gv])=>{
    Object.entries(gv.ages).forEach(([ak,av])=>{
      Object.entries(av.situations).forEach(([sk,sv])=>{
        const haystack = (sv.label+sv.opener+sv.note+sv.tip+sv.convo.map(c=>c.t).join(' ')).toLowerCase();
        if(!q || haystack.includes(q.toLowerCase())){
          results.push({gk,ak,sk,gv,av,sv});
        }
      });
    });
  });
  if(!results.length){
    el.innerHTML=`<div class="search-empty">"${q}"에 해당하는 상황이 없어요</div>`;
    return;
  }
  function hl(txt){
    if(!q) return txt;
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return txt.replace(re,'<mark>$1</mark>');
  }
  el.innerHTML = results.map(({gk,ak,sk,gv,av,sv})=>`
    <div class="search-result-item" onclick="goToSit('${gk}','${ak}','${sk}');closeSearch()">
      <div class="sri-path">${hl(gv.label)} · ${hl(av.label)} · ${hl(sv.label)}</div>
      <div class="sri-opener">"${hl(sv.opener)}"</div>
      <div class="sri-note">${hl(sv.note)}</div>
    </div>
  `).join('');
}

// ─── TOAST ──────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2000);
}

// ─── COPY ───────────────────────────────────────────────────────────
function copyOpener(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>showToast('서론 멘트가 복사됐어요 ✓'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('서론 멘트가 복사됐어요 ✓');
  }
}

// ─── GUIDE RENDER ───────────────────────────────────────────────────
function dots(){
  const lbl=['성별','나이대','상황','가이드'];
  return `<div class="step-row">${[0,1,2,3].map(i=>`<div class="sdot ${i<S.step?'done':i===S.step?'on':''}"></div>`).join('')}<span class="step-lbl">${lbl[S.step]}</span></div>`;
}
function bc(){
  if(!S.g) return '';
  let h=`<div class="bc">`;
  h+=`<span>${D[S.g].label}</span>`;
  if(S.a) h+=`<i class="ti ti-chevron-right" style="font-size:10px;color:var(--text3)"></i><span>${D[S.g].ages[S.a].label}</span>`;
  if(S.sit) h+=`<i class="ti ti-chevron-right" style="font-size:10px;color:var(--text3)"></i><span>${D[S.g].ages[S.a].situations[S.sit].label}</span>`;
  return h+'</div>';
}

function renderGuide(){
  const el = document.getElementById('guide-content');
  let h = `<div class="card"><div class="card-body">${dots()}${bc()}`;
  if(S.step>0) h+=`<button class="back-btn" onclick="back()"><i class="ti ti-arrow-left"></i> 이전으로</button>`;

  if(S.step===0){
    h+=`<p class="sec-h">대화 대상의 성별을 선택하세요</p>
        <p class="sec-s">먼저 말을 건넬 분의 성별을 선택해 주세요</p>
        <div class="opt-grid g2">
          <button class="opt-btn" onclick="pick('g','male')">
            <div class="oico"><i class="ti ti-user"></i></div>
            <div class="olbl">남성</div><div class="osub">남성 대상 접근법</div>
          </button>
          <button class="opt-btn" onclick="pick('g','female')">
            <div class="oico"><i class="ti ti-user-circle"></i></div>
            <div class="olbl">여성</div><div class="osub">여성 대상 접근법</div>
          </button>
        </div>`;
  } else if(S.step===1){
    h+=`<p class="sec-h">나이대를 선택하세요</p>
        <p class="sec-s">${D[S.g].label} 대상의 나이대를 선택해 주세요</p>
        <div class="opt-grid g3">`;
    Object.entries(D[S.g].ages).forEach(([k,v])=>{
      h+=`<button class="opt-btn" onclick="pick('a','${k}')">
        <div class="oico"><i class="ti ${AGE_ICO[k]}"></i></div>
        <div class="olbl">${v.label}</div><div class="osub">${v.sub}</div>
      </button>`;
    });
    h+=`</div>`;
  } else if(S.step===2){
    const sits = D[S.g].ages[S.a].situations;
    h+=`<p class="sec-h">현재 상황을 선택하세요</p>
        <p class="sec-s">어떤 상황에서 만난 분인지 선택해 주세요</p>
        <div class="opt-grid g2">`;
    Object.entries(sits).forEach(([k,v])=>{
      h+=`<button class="opt-btn" onclick="pick('sit','${k}')">
        <div class="olbl" style="font-size:13px">${v.label}</div>
      </button>`;
    });
    h+=`</div>`;
  } else {
    const d = D[S.g].ages[S.a].situations[S.sit];
    const starred = isFav(S.g, S.a, S.sit);
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div class="badge"><i class="ti ti-message-circle"></i> 효과적인 서론</div>
          <button class="star-btn ${starred?'starred':''}" onclick="toggleFav('${S.g}','${S.a}','${S.sit}')">
            <i class="ti ${starred?'ti-star-filled':'ti-star'}"></i>
          </button>
        </div>
        <div class="opener-box">
          <div class="opener-txt">"${d.opener}"</div>
          <button class="copy-btn" onclick="copyOpener('${d.opener.replace(/'/g,"\\'")}')">
            <i class="ti ti-copy"></i> 복사
          </button>
        </div>
        <div class="note-txt">${d.note}</div>
        <button class="expand-btn" onclick="toggleConvo(this)">
          <i class="ti ti-messages"></i>
          <span>대화 흐름 보기</span>
          <i class="ti ti-chevron-down" style="margin-left:auto;transition:transform .2s"></i>
        </button>
        <div style="display:none" id="convo-box">
          <div class="convo">
            <div class="convo-hd"><i class="ti ti-messages"></i> 대화 흐름 예시</div>
            <div class="msgs">`;
    d.convo.forEach(m=>{
      h+=`<div class="msg"><div class="role ${m.r}">${m.r==='we'?'우리':'상대방'}</div><div class="msg-txt">${m.t}</div></div>`;
    });
    h+=`</div><div class="tip-box"><i class="ti ti-bulb" style="flex-shrink:0"></i><span>${d.tip}</span></div></div></div>`;
    // other situations
    const sits = D[S.g].ages[S.a].situations;
    const others = Object.entries(sits).filter(([k])=>k!==S.sit);
    if(others.length){
      h+=`<div class="divider"><div class="divider-line"></div><div class="divider-txt">같은 나이대 다른 상황</div><div class="divider-line"></div></div>
          <div class="chips-row">`;
      others.forEach(([k,v])=>{h+=`<span class="chip" onclick="pick('sit','${k}')">${v.label}</span>`;});
      h+=`</div>`;
    }
  }
  h+='</div></div>';
  el.innerHTML=h;
}

function pick(t,v){
  if(t==='g'){S.g=v;S.a=null;S.sit=null;S.step=1;}
  else if(t==='a'){S.a=v;S.sit=null;S.step=2;}
  else{S.sit=v;S.step=3;addRecent(S.g,S.a,v);}
  renderGuide();
}
function back(){
  if(S.step===1){S.g=null;S.step=0;}
  else if(S.step===2){S.a=null;S.step=1;}
  else{S.sit=null;S.step=2;}
  renderGuide();
}
function toggleConvo(btn){
  const box=document.getElementById('convo-box');
  const open=box.style.display==='none';
  box.style.display=open?'block':'none';
  btn.querySelector('span').textContent=open?'대화 흐름 접기':'대화 흐름 보기';
  btn.querySelector('.ti-chevron-down').style.transform=open?'rotate(180deg)':'rotate(0)';
}

// ─── INIT ────────────────────────────────────────────────────────────
renderGuide();
</script>
</body>
</html>
